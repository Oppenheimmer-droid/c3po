name: Backend Tests & Linting

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/test-backend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: redrive_edu_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'backend/requirements.txt'
    
    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with ruff
      working-directory: backend
      run: |
        pip install ruff
        ruff check . --select=E,W,F,I,N,UP,D
      continue-on-error: true
    
    - name: Type checking with mypy
      working-directory: backend
      run: |
        pip install mypy types-python-dotenv types-redis
        mypy app --ignore-missing-imports
      continue-on-error: true
    
    - name: Run pytest
      working-directory: backend
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/redrive_edu_test
        REDIS_URL: redis://localhost:6379/0
        ENVIRONMENT: test
        DEBUG: "false"
        SECRET_KEY: test-secret-key-min-32-characters-12345
        OPENAI_API_KEY: sk-test-dummy-key
        CHROMA_PERSIST_DIR: /tmp/chroma_test
      run: |
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./backend/coverage.xml
        flags: backend
      continue-on-error: true
