name: Deploy Backend to Railway

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  notify-railway-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Railway Status
        run: |
          echo "==========================================="
          echo "Railway Backend Deployment"
          echo "==========================================="
          echo ""
          echo "⚠️  Railway has GitHub integration enabled."
          echo "    Deployments are triggered automatically"
          echo "    when backend code changes."
          echo ""
          echo "📋 To check deployment status:"
          echo "   1. Go to: https://railway.app/dashboard"
          echo "   2. Select your project"
          echo "   3. Check the Deployments tab"
          echo ""
          echo "🔧 Required Environment Variables in Railway:"
          echo "   - DATABASE_URL"
          echo "   - SECRET_KEY"
          echo "   - GROQ_API_KEY"
          echo "   - ENVIRONMENT=production"
          echo "   - DEBUG=false"
          echo ""
          echo "📊 Backend Health Check:"
          curl -s -o /dev/null -w "   HTTP Status: %{http_code}\n" https://c3po-production-0c24.up.railway.app/api/v1/health || echo "   Unable to connect"
          echo "==========================================="
