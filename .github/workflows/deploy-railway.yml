name: Deploy Backend to Railway

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-railway.yml'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI via npm
        run: npm install -g @railway/cli

      - name: Login to Railway
        run: railway login --token=${{ secrets.RAILWAY_TOKEN }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy to Railway
        run: railway up --service backend --dir backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Verify Deployment Status
        run: |
          echo "Waiting for Railway deployment..."
          sleep 30
          echo "Checking backend health..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://c3po-production-0c24.up.railway.app/api/v1/health || echo "000")
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Backend is healthy!"
          else
            echo "⚠️ Backend returned status $HTTP_CODE. Check Railway dashboard."
          fi

      - name: Deployment Summary
        run: |
          echo "==========================================="
          echo "Railway Deployment Summary"
          echo "==========================================="
          echo "Backend URL: https://c3po-production-0c24.up.railway.app"
          echo "Health Check: /api/v1/health"
          echo "Railway Dashboard: https://railway.app/dashboard"
          echo "==========================================="
