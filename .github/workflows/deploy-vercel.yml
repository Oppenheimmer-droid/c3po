name: Deploy Frontend to Vercel

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

jobs:
  notify-vercel-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Vercel Status
        run: |
          echo "==========================================="
          echo "Vercel Frontend Deployment"
          echo "==========================================="
          echo ""
          echo "✅ Vercel has GitHub integration enabled."
          echo "   Deployments are triggered automatically"
          echo "   when frontend code changes."
          echo ""
          echo "📋 To configure Vercel project settings:"
          echo "   1. Go to: https://vercel.com/rojects-c08bb50e/frontend/settings"
          echo "   2. Set Root Directory: frontend"
          echo "   3. Or import project from frontend/ folder"
          echo ""
          echo "📊 Frontend Health Check:"
          curl -s -o /dev/null -w "   HTTP Status: %{http_code}\n" https://c3po-frontend.vercel.app || echo "   Unable to connect"
          echo "==========================================="
