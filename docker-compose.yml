version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: c3po-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-c3po}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-c3po_secret}
      POSTGRES_DB: ${POSTGRES_DB:-c3po_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-c3po} -d ${POSTGRES_DB:-c3po_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - c3po-network

  # Redis (optional, for Celery workers)
  redis:
    image: redis:7-alpine
    container_name: c3po-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - c3po-network

  # ChromaDB Vector Store
  chroma:
    image: chromadb/chroma:latest
    container_name: c3po-chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - c3po-network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: c3po-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-c3po}:${POSTGRES_PASSWORD:-c3po_secret}@postgres:5432/${POSTGRES_DB:-c3po_db}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-c3po}:${POSTGRES_PASSWORD:-c3po_secret}@postgres:5432/${POSTGRES_DB:-c3po_db}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - DEBUG=${DEBUG:-true}
      - ENVIRONMENT=development
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - PORT=8000
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://frontend:3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - c3po-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: c3po-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - c3po-network

networks:
  c3po-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local