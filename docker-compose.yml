version: '3.8'

services:
  # ChromaDB Vector Store
  chromadb:
    image: chromadb/chroma:latest
    container_name: c3po-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # C3PO API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: c3po-api
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - DEBUG=${DEBUG:-false}
    ports:
      - "8000:8000"
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - ./app:/app/app

  # C3PO Frontend (React + Vite for simple frontend)
  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    container_name: c3po-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api

volumes:
  chroma_data:
