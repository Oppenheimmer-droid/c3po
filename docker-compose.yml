# ============================================
# C3PO Docker Compose - Development
# ============================================
version: '3.8'

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: c3po-postgres
    environment:
      POSTGRES_DB: c3po
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d c3po"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - c3po-network

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: c3po-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - c3po-network

  # ==========================================
  # ChromaDB Vector Store
  # ==========================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: c3po-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - c3po-network

  # ==========================================
  # Backend API
  # ==========================================
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    container_name: c3po-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/c3po
      - DATABASE_URL_SYNC=postgresql+psycopg2://postgres:postgres@postgres:5432/c3po
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIR=/chroma/chroma
      - SECRET_KEY=c3po-dev-secret-key-change-in-production
      - ENVIRONMENT=development
      - DEBUG=true
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,https://*.vercel.app
      - ALLOW_CREDENTIALS=true
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MOCK=true
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=llama-3.1-8b-instant
      - GROQ_MOCK=${GROQ_MOCK:-true}
      - AI_PROVIDER=groq
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - uploads:/app/uploads
      - chroma_data:/chroma/chroma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - c3po-network

  # ==========================================
  # Frontend
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    container_name: c3po-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - api
    networks:
      - c3po-network

  # ==========================================
  # Celery Worker (optional - for background tasks)
  # ==========================================
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    container_name: c3po-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/c3po
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIR=/chroma/chroma
    volumes:
      - ./backend/app:/app/app
      - uploads:/app/uploads
      - chroma_data:/chroma/chroma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    networks:
      - c3po-network
    profiles:
      - worker

# ==========================================
# Networks
# ==========================================
networks:
  c3po-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
  redis_data:
  chroma_data:
  uploads: