# ============================================
# C3PO - Production Docker Compose
# Branch: agents
# ============================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: c3po-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - c3po-prod-network
    deploy:
      resources:
        limits:
          memory: 512M

  # Redis (for caching)
  redis:
    image: redis:7-alpine
    container_name: c3po-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - c3po-prod-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ChromaDB Vector Store
  chroma:
    image: chromadb/chroma:latest
    container_name: c3po-chroma-prod
    restart: always
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data_prod:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - c3po-prod-network
    deploy:
      resources:
        limits:
          memory: 1G

  # Backend API (FastAPI) - Production
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: c3po-backend:latest
    container_name: c3po-backend-prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=false
      - ENVIRONMENT=production
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS}
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
    networks:
      - c3po-prod-network
    deploy:
      resources:
        limits:
          memory: 1G
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # Frontend (Next.js) - Production
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: c3po-frontend:latest
    container_name: c3po-frontend-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${BACKEND_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${BACKEND_WS_URL:-ws://localhost:8000}
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - c3po-prod-network
    deploy:
      resources:
        limits:
          memory: 512M

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: c3po-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - c3po-prod-network
    profiles:
      - with-nginx

networks:
  c3po-prod-network:
    driver: bridge

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  chroma_data_prod:
    driver: local
