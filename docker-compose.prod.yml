# ============================================
# C3PO Docker Compose - Production
# ============================================
version: '3.8'

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: c3po-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: c3po
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d c3po"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - c3po-network

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: c3po-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - c3po-network

  # ==========================================
  # ChromaDB Vector Store
  # ==========================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: c3po-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - c3po-network

  # ==========================================
  # Backend API
  # ==========================================
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: c3po-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIR=/chroma/chroma
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ALLOW_CREDENTIALS=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MOCK=${OPENAI_MOCK:-false}
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - chroma_data:/chroma/chroma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - c3po-network

  # ==========================================
  # Frontend (Nginx for production)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: c3po-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/.next:/usr/share/nginx/html:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - c3po-network
    profiles:
      - nginx

  # ==========================================
  # Celery Worker
  # ==========================================
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: c3po-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIR=/chroma/chroma
    volumes:
      - uploads:/app/uploads
      - chroma_data:/chroma/chroma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    networks:
      - c3po-network
    profiles:
      - worker

# ==========================================
# Networks
# ==========================================
networks:
  c3po-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local
  uploads:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local