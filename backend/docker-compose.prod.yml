services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: redrive_edu
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CHROMA_USE_CLOUD=${CHROMA_USE_CLOUD:-true}
      - CHROMA_CLOUD_API_KEY=${CHROMA_CLOUD_API_KEY}
      - CHROMA_CLOUD_HOST=${CHROMA_CLOUD_HOST:-api.trychroma.com}
      - CHROMA_CLOUD_PORT=${CHROMA_CLOUD_PORT:-443}
      - CHROMA_CLOUD_ENABLE_SSL=${CHROMA_CLOUD_ENABLE_SSL:-true}
      - CHROMA_CLOUD_TENANT=${CHROMA_CLOUD_TENANT}
      - CHROMA_CLOUD_DATABASE=${CHROMA_CLOUD_DATABASE}
      - CHROMA_PERSIST_DIR=/chroma/chroma
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CHROMA_USE_CLOUD=${CHROMA_USE_CLOUD:-true}
      - CHROMA_CLOUD_API_KEY=${CHROMA_CLOUD_API_KEY}
      - CHROMA_CLOUD_HOST=${CHROMA_CLOUD_HOST:-api.trychroma.com}
      - CHROMA_CLOUD_PORT=${CHROMA_CLOUD_PORT:-443}
      - CHROMA_CLOUD_ENABLE_SSL=${CHROMA_CLOUD_ENABLE_SSL:-true}
      - CHROMA_CLOUD_TENANT=${CHROMA_CLOUD_TENANT}
      - CHROMA_CLOUD_DATABASE=${CHROMA_CLOUD_DATABASE}
      - CHROMA_PERSIST_DIR=/chroma/chroma
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    command: celery -A app.workers.celery_app worker --loglevel=info

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
  postgres_data:
  redis_data:
  chroma_data: